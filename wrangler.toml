name = "privatepaste"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Static assets served from frontend build
[assets]
directory = "./frontend/dist"
binding = "ASSETS"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "privatepaste-db"
database_id = "0dcd1e89-23d4-4808-87fd-10d36edf9a6e"
migrations_dir = "migrations"

# KV for rate limiting counters
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a48f8c6c49a04196bcb5bcc485ae547f"

# Variables de entorno públicas
[vars]
ENVIRONMENT = "production"

# Cron trigger para limpieza automática (cada hora)
[[triggers]]
crons = ["0 * * * *"]

# Excluir drizzle-orm del bundle — lo resuelve el runtime de Workers
[build]
command = ""

[build.upload]
format = "modules"

[[rules]]
type = "ESModule"
globs = ["**/*.mjs"]
