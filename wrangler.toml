name = "privatepaste-production"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# SPA fix: sirve index.html para rutas sin fichero estático (React Router)
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 Database
# ⚠ Sustituye con tu Database ID real
[[d1_databases]]
binding = "DB"
database_name = "privatepaste-db"
database_id = "0dcd1e89-23d4-4808-87fd-10d36edf9a6e"
migrations_dir = "migrations"

# KV para rate limiting
# ⚠ Sustituye con tu KV Namespace ID real
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "a48f8c6c49a04196bcb5bcc485ae547f"

# Variables públicas (NO secretos: este archivo se versiona en git).
# Cualquier valor sensible (API keys, AUTH_SECRET, TURNSTILE_SECRET_KEY,
# tokens, etc.) debe configurarse SIEMPRE como Secret cifrado, nunca aquí:
#   - Producción: `npx wrangler secret put NOMBRE_SECRETO`
#     (o Dashboard → Workers & Pages → tu Worker → Settings → Variables and Secrets)
#   - Desarrollo local: copia .dev.vars.example a .dev.vars (ya está en
#     .gitignore) y `wrangler dev` lo cargará automáticamente.
[vars]
ENVIRONMENT = "production"
# Remitente de los emails transaccionales (verificación, etc.) vía Resend.
# No es secreto (solo una dirección), pero el dominio debe estar
# verificado en tu cuenta de Resend o los envíos fallarán/irán a spam.
EMAIL_FROM = "onboarding@resend.dev"

# Cron: limpieza automática cada hora
[[triggers]]
crons = ["0 * * * *"]
