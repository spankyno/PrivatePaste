name = "privatepaste-production"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# SPA fix: sirve index.html para rutas sin fichero estático (React Router)
[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# D1 Database
# ⚠ Sustituye con tu Database ID real
[[d1_databases]]
binding = "DB"
database_name = "privatepaste-db"
database_id = "0dcd1e89-23d4-4808-87fd-10d36edf9a6e"
migrations_dir = "migrations"

# KV para rate limiting
# ⚠ Sustituye con tu KV Namespace ID real
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Variables públicas
[vars]
ENVIRONMENT = "production"

# Cron: limpieza automática cada hora
[[triggers]]
crons = ["0 * * * *"]
